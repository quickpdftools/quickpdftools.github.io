<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Contact QuickPDFTools</title>
  <meta name="description" content="Contact QuickPDFTools for support, feedback, or feature requests."/>
  <link rel="canonical" href="https://quickpdftools.github.io/contact.html"/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
  <header class="site-header"><div class="container header-inner"><a href="index.html" class="logo"><span class="logo-icon">⚡</span><span class="logo-text">Quick<strong>PDF</strong>Tools</span></a><button class="theme-toggle" id="themeToggle">🌙</button></div></header>
  <div class="tool-page" style="max-width:600px;">
    <h1 style="font-family:var(--font-display);font-size:2.2rem;font-weight:800;margin-bottom:8px;">Contact Us</h1>
    <p style="color:var(--text2);margin-bottom:32px;">Have a question, found a bug, or want to suggest a new tool? We'd love to hear from you.</p>
    <div style="background:var(--card-bg);border:1px solid var(--border);border-radius:var(--radius);padding:32px;">
      <div style="display:flex;flex-direction:column;gap:16px;">
        <div>
          <label style="font-size:0.85rem;font-weight:600;display:block;margin-bottom:6px;">Your Name</label>
          <input type="text" id="cname" placeholder="Enter your name" style="width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:8px;background:var(--bg);color:var(--text);font-size:0.9rem;outline:none;font-family:var(--font-body);"/>
        </div>
        <div>
          <label style="font-size:0.85rem;font-weight:600;display:block;margin-bottom:6px;">Email Address</label>
          <input type="email" id="cemail" placeholder="your@email.com" style="width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:8px;background:var(--bg);color:var(--text);font-size:0.9rem;outline:none;font-family:var(--font-body);"/>
        </div>
        <div>
          <label style="font-size:0.85rem;font-weight:600;display:block;margin-bottom:6px;">Message</label>
          <textarea id="cmsg" placeholder="Your message..." rows="5" style="width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:8px;background:var(--bg);color:var(--text);font-size:0.9rem;outline:none;font-family:var(--font-body);resize:vertical;"></textarea>
        </div>
        <button class="btn" onclick="sendMsg()" style="align-self:flex-start;">📧 Send Message</button>
        <div id="msgSent" style="display:none;color:#2d7a4f;font-weight:600;font-size:0.9rem;">✅ Thanks! We'll get back to you soon.</div>
      </div>
    </div>
    <p style="color:var(--text2);font-size:0.85rem;margin-top:20px;text-align:center;">Or email us directly at: <a href="mailto:quickpdftools@gmail.com" style="color:var(--accent);">quickpdftools@gmail.com</a></p>
  </div>
  <footer class="site-footer"><div class="footer-bottom container"><p>© 2025 QuickPDFTools. All rights reserved.</p></div></footer>
  <script src="js/main.js"></script>
  <script>
    function sendMsg() {
      const name = document.getElementById('cname').value.trim();
      const email = document.getElementById('cemail').value.trim();
      const msg = document.getElementById('cmsg').value.trim();
      if (!name || !email || !msg) return alert('Please fill in all fields.');
      // In production, integrate with Formspree or EmailJS
      document.getElementById('msgSent').style.display = 'block';
    }
  </script>
</body>
</html>
